[global]
api_key = "han1234"
admin_username = "admin"
admin_password = "admin"

[flow]
labs_base_url = "https://labs.google/fx/api"
api_base_url = "https://aisandbox-pa.googleapis.com/v1"
timeout = 600
max_retries = 3
image_request_timeout = 300
image_timeout_retry_count = 0
image_timeout_retry_delay = 0.2
image_timeout_use_media_proxy_fallback = true
image_prefer_media_proxy = true
image_slot_wait_timeout = 900
image_launch_soft_limit = 25
image_launch_wait_timeout = 900
image_launch_stagger_ms = 250
video_slot_wait_timeout = 480
video_launch_soft_limit = 20
video_launch_wait_timeout = 480
video_launch_stagger_ms = 250
poll_interval = 3.0
max_poll_attempts = 200

[server]
host = "0.0.0.0"
port = 8000

[debug]
enabled = true
log_requests = true
log_responses = true
mask_token = true

[proxy]
proxy_enabled = false
proxy_url = ""

[generation]
image_timeout = 600
upsample_timeout = 45
video_timeout = 1500

[admin]
error_ban_threshold = 3

[cache]
enabled = true
timeout = 600  # 缓存超时时间(秒), 默认2小时
base_url = "https://api-direct.aura890.com"   # 缓存文件访问的基础URL, 留空则使用服务器地址

[captcha]
captcha_method = "remote_browser"  # 打码方式: yescaptcha/browser/personal/remote_browser
browser_recaptcha_settle_seconds = 1.0  # 打码完成额外稳态等待，速度优先可设 1.0
browser_launch_background = true  # browser 打码默认后台启动(最小化/避免抢占前台)
yescaptcha_api_key = ""  # YesCaptcha API密钥
yescaptcha_base_url = "https://api.yescaptcha.com"
remote_browser_base_url = "http://64.118.150.10:8060"  # 远程有头打码服务地址
remote_browser_api_key = "fcs_-HzN8mp06f1nHfKjlkdvQmO2in9h2qIffUOUOoN8gw8"   # 远程有头打码服务 API Key
remote_browser_timeout = 600   # 远程有头打码请求超时(秒)
